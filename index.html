<!DOCTYPE html>
<html lang="hi-EN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tender Mitra Pro | Tally Style Billing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        body { font-family: 'Roboto', sans-serif; -webkit-font-smoothing: antialiased; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;

        // --- CUSTOM HOOK FOR STABLE PROFILE INPUTS ---
        function useProfileState(initialData) {
            const [data, setData] = useState(initialData);
            const updateField = (field, value) => {
                const newData = { ...data, [field]: value };
                setData(newData);
                localStorage.setItem('tm_profile_v2', JSON.stringify(newData));
            };
            return [data, updateField];
        }

        function TenderMitra() {
            const [view, setView] = useState('home'); 
            const [invoices, setInvoices] = useState(() => {
                const saved = localStorage.getItem('tm_invoices');
                return saved ? JSON.parse(saved) : [];
            });
            const [showBillModal, setShowBillModal] = useState(false);
            
            // Profile State with persistence
            const [userProfile, setUserProfile] = useProfileState(() => {
                const saved = localStorage.getItem('tm_profile_v2');
                return saved ? JSON.parse(saved) : {
                    name: "SELF LEARNING",
                    subHeader: "TALLY CUSTOMIZATION",
                    address: "A.B Patel Road, Goregaon, Mumbai",
                    gstin: "27AXXXX54521X1Z",
                    phone: "9407808553",
                    email: "computersolutionsxyz@gmail.com",
                    bankName: "AXIS BANK NEW4525",
                    accNo: "452145224525",
                    ifsc: "AXIS45245",
                    pan: "ACPW2876P",
                    uam: "MH33DO128954",
                    logo: null
                };
            });

            // Bill State for Multiple Items
            const [billMeta, setBillMeta] = useState({ custName: '', custAddress: '', invoiceNo: 'GST/20-21/0101', date: new Date().toISOString().split('T')[0] });
            const [items, setItems] = useState([{ id: 1, desc: '', hsn: '', qty: 1, rate: 0, gstRate: 18 }]);

            useEffect(() => {
                localStorage.setItem('tm_invoices', JSON.stringify(invoices));
            }, [invoices]);

            const addNewItem = () => {
                setItems([...items, { id: Date.now(), desc: '', hsn: '', qty: 1, rate: 0, gstRate: 18 }]);
            };

            const updateItem = (id, field, value) => {
                setItems(items.map(it => it.id === id ? { ...it, [field]: value } : it));
            };

            const removeItem = (id) => {
                if (items.length > 1) setItems(items.filter(it => it.id !== id));
            };

            const totals = useMemo(() => {
                let subTotal = 0;
                let totalTax = 0;
                items.forEach(it => {
                    const rowTotal = it.qty * it.rate;
                    subTotal += rowTotal;
                    totalTax += rowTotal * (it.gstRate / 100);
                });
                return { subTotal, cgst: totalTax / 2, sgst: totalTax / 2, grandTotal: subTotal + totalTax };
            }, [items]);

            // --- PDF GENERATOR ---
            const downloadInvoice = (invData) => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                // Header (Tally Style)
                doc.setFontSize(22);
                doc.setTextColor(180, 0, 0); // Red Header
                doc.text(userProfile.name, 105, 15, { align: 'center' });
                doc.setTextColor(0, 0, 0);
                doc.setFontSize(14);
                doc.text(userProfile.subHeader, 105, 22, { align: 'center' });
                doc.setFontSize(9);
                doc.text(`${userProfile.address} | Contact: ${userProfile.phone}`, 105, 28, { align: 'center' });
                doc.text(`GSTIN/UIN: ${userProfile.gstin}`, 105, 33, { align: 'center' });
                doc.line(10, 36, 200, 36);

                // Buyer & Invoice Details
                doc.setFontSize(10);
                doc.setFont(undefined, 'bold');
                doc.text("Details for Buyer:", 12, 42);
                doc.setFont(undefined, 'normal');
                doc.text(invData.meta.custName, 12, 48);
                doc.text(invData.meta.custAddress, 12, 53);

                doc.text(`Invoice No: ${invData.meta.invoiceNo}`, 120, 42);
                doc.text(`Date: ${invData.meta.date}`, 170, 42);
                doc.line(10, 60, 200, 60);

                // Main Items Table
                const tableBody = invData.items.map((it, index) => [
                    index + 1,
                    it.desc,
                    it.hsn,
                    it.qty,
                    it.rate.toFixed(2),
                    (it.qty * it.rate).toFixed(2)
                ]);

                doc.autoTable({
                    startY: 65,
                    head: [['Sr', 'Description', 'HSN', 'Qty', 'Unit Rate', 'Amount']],
                    body: tableBody,
                    theme: 'grid',
                    headStyles: { fillColor: [240, 240, 240], textColor: [0,0,0], fontStyle: 'bold' },
                    styles: { fontSize: 8 }
                });

                // Summary Calculation
                const finalY = doc.lastAutoTable.finalY + 10;
                doc.text(`Sub-Total: Rs.${invData.totals.subTotal.toFixed(2)}`, 140, finalY);
                doc.text(`CGST: Rs.${invData.totals.cgst.toFixed(2)}`, 140, finalY + 5);
                doc.text(`SGST: Rs.${invData.totals.sgst.toFixed(2)}`, 140, finalY + 10);
                doc.setFont(undefined, 'bold');
                doc.text(`GRAND TOTAL: Rs.${invData.totals.grandTotal.toFixed(2)}`, 140, finalY + 18);

                // Footer: Bank & Signature
                doc.setFont(undefined, 'normal');
                doc.setFontSize(8);
                doc.text("Bank Details:", 12, finalY + 30);
                doc.text(`Bank: ${userProfile.bankName} | A/c: ${userProfile.accNo} | IFSC: ${userProfile.ifsc}`, 12, finalY + 35);
                doc.text(`PAN: ${userProfile.pan} | UAM: ${userProfile.uam}`, 12, finalY + 40);

                doc.line(140, finalY + 60, 190, finalY + 60);
                doc.text("Authorized Signatory", 150, finalY + 65);
                
                doc.setFont(undefined, 'italic');
                doc.text("Save Paper, Save Tree | Jai Hind!", 105, 285, { align: 'center' });

                doc.save(`Invoice_${invData.meta.custName}.pdf`);
            };

            const saveBill = () => {
                const invData = { meta: billMeta, items, totals, id: Date.now() };
                setInvoices([invData, ...invoices]);
                downloadInvoice(invData);
                setShowBillModal(false);
            };

            // --- UI VIEWS ---
            const Home = () => (
                <div className="p-4 space-y-6">
                    <div className="bg-indigo-700 p-6 rounded-3xl text-white shadow-lg">
                        <p className="text-xs uppercase opacity-70">Total Revenue</p>
                        <h1 className="text-3xl font-bold">₹{invoices.reduce((a,b)=>a+b.totals.grandTotal,0).toLocaleString()}</h1>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        <button onClick={()=>setShowBillModal(true)} className="bg-white p-5 rounded-2xl border flex flex-col items-center shadow-sm">
                            <i className="fas fa-plus-circle text-2xl text-green-500 mb-2"></i>
                            <span className="font-bold text-sm">Create Bill</span>
                        </button>
                        <button onClick={()=>setView('profile')} className="bg-white p-5 rounded-2xl border flex flex-col items-center shadow-sm">
                            <i className="fas fa-building text-2xl text-blue-500 mb-2"></i>
                            <span className="font-bold text-sm">Company Profile</span>
                        </button>
                    </div>
                    <div className="space-y-3">
                        <h3 className="font-bold text-gray-700">Recent Invoices</h3>
                        {invoices.map(inv => (
                            <div key={inv.id} className="bg-white p-4 rounded-xl border flex justify-between items-center shadow-xs">
                                <div>
                                    <p className="font-bold">{inv.meta.custName}</p>
                                    <p className="text-[10px] text-gray-400 uppercase">{inv.meta.date} • {inv.items.length} Items</p>
                                </div>
                                <button onClick={()=>downloadInvoice(inv)} className="text-indigo-600"><i className="fas fa-download text-lg"></i></button>
                            </div>
                        ))}
                    </div>
                </div>
            );

            const Profile = () => (
                <div className="p-4 space-y-4">
                    <button onClick={()=>setView('home')} className="text-indigo-600 font-bold mb-2"><i className="fas fa-arrow-left"></i> Home</button>
                    <div className="bg-white p-6 rounded-2xl shadow-sm space-y-4">
                        <h2 className="font-bold text-xl border-b pb-2">Business Header</h2>
                        <input value={userProfile.name} onChange={e=>setUserProfile('name', e.target.value)} placeholder="Company Name" className="w-full border p-3 rounded-lg" />
                        <input value={userProfile.subHeader} onChange={e=>setUserProfile('subHeader', e.target.value)} placeholder="Subtitle (e.g. Construction)" className="w-full border p-3 rounded-lg" />
                        <input value={userProfile.address} onChange={e=>setUserProfile('address', e.target.value)} placeholder="Full Address" className="w-full border p-3 rounded-lg" />
                        <h2 className="font-bold text-xl border-b pb-2 pt-4">Bank & Tax</h2>
                        <input value={userProfile.bankName} onChange={e=>setUserProfile('bankName', e.target.value)} placeholder="Bank Name" className="w-full border p-3 rounded-lg" />
                        <input value={userProfile.accNo} onChange={e=>setUserProfile('accNo', e.target.value)} placeholder="Account Number" className="w-full border p-3 rounded-lg" />
                        <div className="grid grid-cols-2 gap-2">
                            <input value={userProfile.gstin} onChange={e=>setUserProfile('gstin', e.target.value)} placeholder="GSTIN" className="border p-3 rounded-lg" />
                            <input value={userProfile.pan} onChange={e=>setUserProfile('pan', e.target.value)} placeholder="PAN No" className="border p-3 rounded-lg" />
                        </div>
                        <button onClick={()=>setView('home')} className="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold shadow-md">Save Settings</button>
                    </div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen bg-gray-50 pb-10">
                    <div className="bg-white p-4 shadow-sm flex justify-between items-center sticky top-0 z-30">
                        <h1 className="font-black text-indigo-700 italic tracking-tighter text-xl">TENDER MITRA</h1>
                        <i className="fas fa-user-circle text-gray-300 text-2xl"></i>
                    </div>

                    {view === 'home' && <Home />}
                    {view === 'profile' && <Profile />}

                    {showBillModal && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-end animate-fadeIn">
                            <div className="bg-white w-full rounded-t-[2rem] p-6 space-y-4 max-h-[90vh] overflow-y-auto no-scrollbar shadow-2xl">
                                <div className="flex justify-between items-center border-b pb-4">
                                    <h3 className="font-bold text-xl uppercase tracking-tighter">New Tally Invoice</h3>
                                    <button onClick={()=>setShowBillModal(false)} className="text-gray-300 text-3xl">&times;</button>
                                </div>
                                
                                {/* Meta Section */}
                                <div className="space-y-2">
                                    <input placeholder="Buyer Name" className="w-full border p-3 rounded-xl text-sm" onChange={e=>setBillMeta({...billMeta, custName: e.target.value})} />
                                    <input placeholder="Buyer Address" className="w-full border p-3 rounded-xl text-sm" onChange={e=>setBillMeta({...billMeta, custAddress: e.target.value})} />
                                    <div className="flex gap-2">
                                        <input value={billMeta.invoiceNo} className="w-1/2 border p-3 rounded-xl text-sm" onChange={e=>setBillMeta({...billMeta, invoiceNo: e.target.value})} />
                                        <input type="date" value={billMeta.date} className="w-1/2 border p-3 rounded-xl text-sm" onChange={e=>setBillMeta({...billMeta, date: e.target.value})} />
                                    </div>
                                </div>

                                {/* Multi-Item List */}
                                <div className="space-y-4 pt-4 border-t">
                                    <div className="flex justify-between items-center">
                                        <h4 className="font-bold text-xs uppercase text-gray-400">Bill Items</h4>
                                        <button onClick={addNewItem} className="text-xs bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full font-bold">+ Add Item</button>
                                    </div>
                                    {items.map((it, idx) => (
                                        <div key={it.id} className="bg-gray-50 p-4 rounded-2xl space-y-2 relative border border-gray-100">
                                            <button onClick={()=>removeItem(it.id)} className="absolute -top-2 -right-2 bg-red-100 text-red-600 w-6 h-6 rounded-full text-xs">&times;</button>
                                            <input placeholder="Description (e.g. T-Shirt 28)" className="w-full border-none bg-transparent font-bold text-sm" onChange={e=>updateItem(it.id, 'desc', e.target.value)} />
                                            <div className="grid grid-cols-4 gap-2">
                                                <input placeholder="HSN" className="border-b bg-transparent text-xs p-1" onChange={e=>updateItem(it.id, 'hsn', e.target.value)} />
                                                <input type="number" placeholder="Qty" className="border-b bg-transparent text-xs p-1" onChange={e=>updateItem(it.id, 'qty', Number(e.target.value))} />
                                                <input type="number" placeholder="Rate" className="border-b bg-transparent text-xs p-1" onChange={e=>updateItem(it.id, 'rate', Number(e.target.value))} />
                                                <select className="border-b bg-transparent text-xs p-1 font-bold text-indigo-600" onChange={e=>updateItem(it.id, 'gstRate', Number(e.target.value))}>
                                                    <option value="18">18%</option>
                                                    <option value="12">12%</option>
                                                    <option value="5">5%</option>
                                                    <option value="0">0%</option>
                                                </select>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                {/* Total Summary */}
                                <div className="bg-indigo-700 text-white p-5 rounded-3xl space-y-2 shadow-lg">
                                    <div className="flex justify-between text-xs opacity-70 italic">
                                        <span>Subtotal: ₹{totals.subTotal}</span>
                                        <span>Tax (C+S): ₹{totals.cgst + totals.sgst}</span>
                                    </div>
                                    <div className="flex justify-between items-center pt-2">
                                        <p className="text-2xl font-black">₹{totals.grandTotal.toLocaleString()}</p>
                                        <button onClick={saveBill} className="bg-yellow-400 text-indigo-900 px-6 py-4 rounded-2xl font-black text-xs uppercase shadow-md active:scale-95 transition-all">Download PDF</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TenderMitra />);
    </script>
</body>
</html>
