<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaaS Billing System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f4f6f9; }
header { background:#1e3c72; color:#fff; padding:12px; text-align:center; }

.container { padding:10px; }

.card {
  background:#fff;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input, select, button {
  width:100%;
  padding:10px;
  margin:5px 0;
}

button { background:#3498db; color:#fff; border:none; }

table {
  width:100%;
  border-collapse:collapse;
}
th, td {
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}
</style>
</head>

<body>

<header>SaaS Billing System</header>

<div class="container">

<!-- LOGIN -->
<div id="login">
<div class="card">
<h3>Login</h3>
<input id="username" placeholder="Enter name">
<button onclick="login()">Login</button>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="card">
<h3>Create Invoice</h3>

<p><b>Invoice No:</b> <span id="invNo"></span></p>

<input id="customer" placeholder="Customer Name">

<input id="pname" placeholder="Product">
<input id="pprice" placeholder="Price">

<select id="pgst">
<option value="5">5%</option>
<option value="12">12%</option>
<option value="18">18%</option>
</select>

<button onclick="addItem()">Add Item</button>

<table>
<thead>
<tr>
<th>Item</th><th>Price</th><th>GST</th><th>Total</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<!-- EXTRA -->
<h4>Adjustments</h4>

<input id="discount" placeholder="Discount (₹ or %)">
<input id="transport" placeholder="Transport Charges">
<input id="other" placeholder="Other Charges">

<p><b>Final Total: ₹ <span id="finalTotal">0</span></b></p>

<button onclick="generatePDF()">Download Invoice</button>

</div>

<!-- PROFILE -->
<div class="card">
<h3>Profile</h3>

<input type="file" id="logoUpload">
<img id="logoPreview" width="80">

<input type="file" id="signUpload">
<canvas id="canvas" width="250" height="100"></canvas>

<button onclick="saveProfile()">Save</button>
</div>

</div>
</div>

<script>

// LOGIN
function login(){
  localStorage.setItem("user",username.value);
  location.reload();
}
if(localStorage.getItem("user")){
  login.style.display="none";
  app.style.display="block";
}

// INVOICE NUMBER
let inv = localStorage.getItem("inv") || 1001;
invNo.innerText = inv;
localStorage.setItem("inv", ++inv);

// ITEMS
let items=[];

function addItem(){
  let name=pname.value;
  let price=parseFloat(pprice.value);
  let gst=parseFloat(pgst.value);

  let gstAmt=price*gst/100;
  let total=price+gstAmt;

  items.push({name,price,gst,total});
  render();
}

function render(){
  let html="";
  let sum=0;

  items.forEach(i=>{
    html+=`<tr>
      <td>${i.name}</td>
      <td>₹${i.price}</td>
      <td>${i.gst}%</td>
      <td>₹${i.total.toFixed(2)}</td>
    </tr>`;
    sum+=i.total;
  });

  tbody.innerHTML=html;

  // EXTRA CALC
  let disc = discount.value || 0;
  let trans = parseFloat(transport.value)||0;
  let otherC = parseFloat(other.value)||0;

  if(disc.includes("%")){
    disc = sum * parseFloat(disc)/100;
  } else {
    disc = parseFloat(disc)||0;
  }

  let final = sum - disc + trans + otherC;
  finalTotal.innerText = final.toFixed(2);
}

// PROFILE
let logo="",sign="";
logoUpload.onchange=e=>{
  let r=new FileReader();
  r.onload=ev=>{
    logo=ev.target.result;
    logoPreview.src=logo;
  };
  r.readAsDataURL(e.target.files[0]);
};

let ctx=canvas.getContext("2d");
signUpload.onchange=e=>{
  let r=new FileReader();
  r.onload=ev=>{
    let img=new Image();
    img.onload=()=>ctx.drawImage(img,0,0,250,100);
    img.src=ev.target.result;
  };
  r.readAsDataURL(e.target.files[0]);
};

function saveProfile(){
  localStorage.setItem("logo",logo);
  localStorage.setItem("sign",canvas.toDataURL());
  alert("Saved");
}

// PDF
async function generatePDF(){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF("p","mm","a4");

  let y=20;

  doc.setFillColor(30,60,114);
  doc.rect(0,0,210,20,'F');
  doc.setTextColor(255,255,255);
  doc.text("INVOICE",90,13);

  let logo=localStorage.getItem("logo");
  let sign=localStorage.getItem("sign");

  if(logo){
    doc.addImage(logo,'PNG',10,3,30,15);
  }

  doc.setTextColor(0,0,0);

  doc.text("Invoice: "+invNo.innerText,10,30);
  doc.text("Customer: "+customer.value,10,38);
  doc.text("Date: "+new Date().toLocaleDateString(),150,30);

  y=50;

  items.forEach(i=>{
    doc.text(`${i.name} - ₹${i.total.toFixed(2)}`,10,y);
    y+=8;
  });

  y+=10;
  doc.text("Final Total: ₹"+finalTotal.innerText,140,y);

  if(sign){
    doc.text("Signature",10,260);
    doc.addImage(sign,'PNG',10,265,50,20);
  }

  doc.save("Invoice_SaaS.pdf");
}

</script>

</body>
</html>
