<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a3a2a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Tender Mitra - आपका व्यापार साथी</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1f16;
    --bg2: #162b1e;
    --bg3: #1e3829;
    --card: #1a3224;
    --card2: #203d2d;
    --accent: #2ecc71;
    --accent2: #27ae60;
    --accent3: #f39c12;
    --accent4: #e74c3c;
    --accent5: #3498db;
    --text: #e8f5ec;
    --text2: #a8d5b5;
    --text3: #6aab7d;
    --border: #2a4a35;
    --gold: #f1c40f;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Baloo 2', 'Noto Sans Devanagari', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── LAYOUT ── */
  .app { display: flex; min-height: 100vh; }

  /* Sidebar */
  .sidebar {
    width: 240px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 0;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 100;
    transition: transform 0.3s;
  }

  .sidebar-logo {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }

  .logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  .logo-text { line-height: 1.2; }
  .logo-text .t1 { font-size: 16px; font-weight: 800; color: var(--accent); }
  .logo-text .t2 { font-size: 11px; color: var(--text3); }

  .sidebar-nav { padding: 16px 12px; flex: 1; }
  .sidebar-nav .label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--text3); padding: 0 8px; margin-bottom: 8px; margin-top: 16px;
  }
  .sidebar-nav .label:first-child { margin-top: 0; }

  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 14px; border-radius: var(--radius-sm);
    cursor: pointer; color: var(--text2); font-size: 14px; font-weight: 500;
    transition: all 0.2s; margin-bottom: 2px;
    border: 1px solid transparent;
  }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active {
    background: linear-gradient(135deg, rgba(46,204,113,0.15), rgba(46,204,113,0.08));
    color: var(--accent); border-color: rgba(46,204,113,0.2);
  }
  .nav-item .icon { font-size: 18px; width: 22px; text-align: center; }

  .sidebar-footer {
    padding: 16px; border-top: 1px solid var(--border);
    font-size: 12px; color: var(--text3);
  }
  .plan-badge {
    background: linear-gradient(135deg, #f39c12, #e67e22);
    color: white; padding: 3px 8px; border-radius: 20px;
    font-size: 10px; font-weight: 700; display: inline-block; margin-bottom: 8px;
  }

  /* Main */
  .main {
    margin-left: 240px;
    flex: 1;
    min-height: 100vh;
    background: var(--bg);
  }

  .topbar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
  }

  .topbar-title { font-size: 18px; font-weight: 700; color: var(--text); }
  .topbar-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }

  .topbar-right { display: flex; align-items: center; gap: 12px; }

  .user-chip {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg3); padding: 7px 14px; border-radius: 30px;
    border: 1px solid var(--border); cursor: pointer;
    font-size: 13px; font-weight: 600;
  }

  .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
  }

  .page { padding: 24px; max-width: 1200px; }

  /* Cards */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  .card-sm {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 16px;
  }

  /* Grid */
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

  /* Quick action cards */
  .action-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 20px;
    cursor: pointer;
    transition: all 0.25s;
    display: flex; flex-direction: column; align-items: flex-start; gap: 14px;
    min-height: 120px;
    position: relative;
    overflow: hidden;
  }
  .action-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--card-accent, var(--accent));
  }
  .action-card:hover {
    border-color: var(--card-accent, var(--accent));
    transform: translateY(-2px);
    background: var(--card2);
  }
  .action-card .ac-icon {
    font-size: 32px;
    width: 52px; height: 52px;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
  }
  .action-card .ac-title { font-size: 16px; font-weight: 700; color: var(--text); }
  .action-card .ac-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }

  /* Stats */
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .stat-label { font-size: 12px; color: var(--text3); margin-bottom: 8px; }
  .stat-value { font-size: 26px; font-weight: 800; color: var(--text); }
  .stat-delta { font-size: 12px; margin-top: 4px; }
  .delta-up { color: var(--accent); }
  .delta-down { color: var(--accent4); }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 12px 20px; border-radius: var(--radius-sm); border: none;
    font-family: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; min-height: 44px;
    text-decoration: none;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-secondary {
    background: var(--bg3); color: var(--text2);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: var(--accent4); color: white; }
  .btn-gold {
    background: linear-gradient(135deg, var(--gold), #e67e22);
    color: #1a1a1a; font-weight: 700;
  }
  .btn-sm { padding: 8px 14px; font-size: 12px; min-height: 34px; }
  .btn-full { width: 100%; }

  /* Form */
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 13px; color: var(--text2); margin-bottom: 6px; display: block; font-weight: 500; }
  .form-input, .form-select {
    width: 100%; padding: 12px 14px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: inherit; font-size: 14px; outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus, .form-select:focus { border-color: var(--accent); }
  .form-select option { background: var(--bg2); }
  .form-input::placeholder { color: var(--text3); }

  /* Table */
  .table-wrap { overflow-x: auto; border-radius: var(--radius-sm); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    background: var(--bg3); color: var(--text3);
    padding: 10px 14px; text-align: left;
    font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 12px 14px; border-bottom: 1px solid rgba(42,74,53,0.4);
    color: var(--text2);
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg3); }

  /* Badge */
  .badge {
    display: inline-flex; align-items: center;
    padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
  }
  .badge-green { background: rgba(46,204,113,0.15); color: var(--accent); }
  .badge-yellow { background: rgba(243,156,18,0.15); color: var(--accent3); }
  .badge-red { background: rgba(231,76,60,0.15); color: var(--accent4); }
  .badge-blue { background: rgba(52,152,219,0.15); color: var(--accent5); }

  /* Section header */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-title { font-size: 16px; font-weight: 700; color: var(--text); }
  .section-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }

  /* Tender card */
  .tender-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    transition: all 0.2s;
    cursor: pointer;
  }
  .tender-card:hover { border-color: var(--accent5); }
  .tender-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 8px; line-height: 1.4; }
  .tender-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  .tender-meta span {
    font-size: 11px; color: var(--text3);
    display: flex; align-items: center; gap: 4px;
  }
  .tender-footer { display: flex; align-items: center; justify-content: space-between; }
  .tender-value { font-size: 16px; font-weight: 800; color: var(--accent); }
  .deadline-urgent { color: var(--accent4); }

  /* Disclaimer */
  .disclaimer {
    background: rgba(243,156,18,0.08);
    border: 1px solid rgba(243,156,18,0.25);
    border-radius: var(--radius-sm);
    padding: 12px 16px; font-size: 12px; color: var(--accent3);
    display: flex; gap: 10px; align-items: flex-start;
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: white;
    padding: 12px 24px; border-radius: 30px;
    font-size: 14px; font-weight: 600;
    z-index: 999; display: none;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { transform: translateX(-50%) translateY(20px); opacity: 0; }
    to { transform: translateX(-50%) translateY(0); opacity: 1; }
  }

  /* Bottom Nav (mobile) */
  .bottom-nav {
    display: none;
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--bg2); border-top: 1px solid var(--border);
    padding: 6px 0 8px; z-index: 100;
  }
  .bottom-nav-inner {
    display: flex; justify-content: space-around;
  }
  .bnav-item {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 6px 16px; cursor: pointer; border-radius: 10px;
    transition: all 0.2s; color: var(--text3); font-size: 11px; font-weight: 500;
  }
  .bnav-item.active { color: var(--accent); }
  .bnav-item .bnav-icon { font-size: 20px; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 200; display: none; align-items: center; justify-content: center;
    padding: 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px;
    width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto;
  }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
  .modal-footer { display: flex; gap: 10px; margin-top: 20px; }

  /* Login Screen */
  .login-screen {
    min-height: 100vh;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .login-box {
    width: 100%; max-width: 380px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 36px 28px;
    text-align: center;
  }
  .login-logo {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 16px; margin: 0 auto 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
  }
  .otp-inputs { display: flex; gap: 10px; justify-content: center; margin: 16px 0; }
  .otp-input {
    width: 48px; height: 56px; text-align: center;
    background: var(--bg3); border: 2px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-size: 20px; font-weight: 700; font-family: 'JetBrains Mono', monospace;
    outline: none;
  }
  .otp-input:focus { border-color: var(--accent); }

  /* Invoice preview */
  .invoice-preview {
    background: white; color: #111; padding: 30px;
    border-radius: var(--radius); font-size: 12px;
    line-height: 1.6;
  }
  .inv-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
  .inv-title { font-size: 20px; font-weight: 800; color: #1a3a2a; }
  .inv-divider { border: none; border-top: 2px solid #1a3a2a; margin: 12px 0; }
  .inv-table { width: 100%; border-collapse: collapse; margin: 12px 0; }
  .inv-table th { background: #1a3a2a; color: white; padding: 8px; font-size: 11px; }
  .inv-table td { padding: 8px; border-bottom: 1px solid #eee; }
  .inv-total { text-align: right; margin-top: 12px; }
  .inv-total .total-row { display: flex; justify-content: space-between; padding: 4px 0; }
  .inv-total .grand { font-size: 15px; font-weight: 800; border-top: 2px solid #1a3a2a; padding-top: 8px; margin-top: 4px; }

  /* Divider */
  .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

  /* Progress bar */
  .progress-bar { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.5s; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Tag */
  .tag {
    display: inline-block; padding: 4px 10px; border-radius: 6px;
    font-size: 11px; font-weight: 600; cursor: pointer;
    transition: all 0.2s;
    background: var(--bg3); color: var(--text3);
    border: 1px solid var(--border);
  }
  .tag.selected {
    background: rgba(46,204,113,0.15); color: var(--accent);
    border-color: var(--accent);
  }

  /* Chart bar */
  .chart-bar-wrap { display: flex; align-items: flex-end; gap: 8px; height: 100px; }
  .chart-bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .chart-bar {
    width: 100%; background: var(--accent); border-radius: 4px 4px 0 0;
    transition: height 0.5s ease;
    min-height: 4px;
  }
  .chart-bar.expense { background: var(--accent4); }
  .chart-label { font-size: 10px; color: var(--text3); }

  /* Responsive */
  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .main { margin-left: 0; padding-bottom: 70px; }
    .bottom-nav { display: block; }
    .grid2, .grid3, .grid4 { grid-template-columns: 1fr 1fr; }
    .topbar { padding: 12px 16px; }
    .page { padding: 16px; }
    .action-card { min-height: 100px; padding: 18px 14px; }
    .action-card .ac-icon { font-size: 26px; width: 44px; height: 44px; }
    .action-card .ac-title { font-size: 14px; }
    .grid4 { grid-template-columns: 1fr 1fr; }
  }

  @media (max-width: 480px) {
    .grid2, .grid3, .grid4 { grid-template-columns: 1fr 1fr; }
  }

  /* Animations */
  .fade-in { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .pulse {
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  /* Sidebar overlay for mobile */
  .sidebar-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 99;
  }
  .sidebar-overlay.open { display: block; }

  /* Income vs expense pills */
  .pill-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .pill {
    padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
    cursor: pointer; border: 1px solid transparent; transition: all 0.2s;
  }
  .pill.inc { background: rgba(46,204,113,0.1); color: var(--accent); border-color: rgba(46,204,113,0.2); }
  .pill.exp { background: rgba(231,76,60,0.1); color: var(--accent4); border-color: rgba(231,76,60,0.2); }
  .pill.neu { background: var(--bg3); color: var(--text3); border-color: var(--border); }
  .pill:hover { opacity: 0.8; }

  /* Empty state */
  .empty-state {
    text-align: center; padding: 40px 20px;
    color: var(--text3); font-size: 14px;
  }
  .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
</style>
</head>
<body>

<div id="app"></div>
<div id="toast" class="toast"></div>

  ],

  loginStep: 'phone', // phone, otp
  phone: '',

function calcInvoice(inv) {
  let subtotal = 0, gstAmount = 0;
  (inv.items||[]).forEach(it => {
    const base = (it.qty||0) * (it.price||0);
    subtotal += base;
    gstAmount += base * ((it.gst||0)/100);
  });
  const discount = inv.discount||0;
  const transport = inv.transport||0;
  const total = subtotal - discount + transport + gstAmount;
  return { subtotal, gstAmount, discount, transport, total };
}

function formatCurrency(n) {
  return '₹' + Number(n).toLocaleString('en-IN');
}

function daysLeft(deadline) {
  const d = new Date(deadline) - new Date();
  return Math.ceil(d / (1000*60*60*24));
}

function showToast(msg, duration=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', duration);
}

function selectGST(rate) {
  document.querySelectorAll('[data-gst]').forEach(el => el.classList.remove('selected'));
  document.querySelector(`[data-gst="${rate}"]`).classList.add('selected');
  window._selectedGST = rate;
  updatePreview();
}

function updatePreview() {
  const qty = parseFloat(document.getElementById('inv_qty')?.value)||1;
  const price = parseFloat(document.getElementById('inv_price')?.value)||0;
  const gst = window._selectedGST !== undefined ? window._selectedGST : 18;
  const disc = parseFloat(document.getElementById('inv_discount')?.value)||0;
  const trans = parseFloat(document.getElementById('inv_transport')?.value)||0;
  const sub = qty * price;
  const gstAmt = sub * gst/100;
  const total = sub + gstAmt - disc + trans;
  if(document.getElementById('pc_sub')) {
    document.getElementById('pc_sub').textContent = formatCurrency(sub);
    document.getElementById('pc_gst').textContent = formatCurrency(gstAmt);
    document.getElementById('pc_disc').textContent = '-' + formatCurrency(disc);
    document.getElementById('pc_trans').textContent = formatCurrency(trans);
    document.getElementById('pc_total').textContent = formatCurrency(total);
  }
}

function generateInvoice() {
  const customer = document.getElementById('inv_customer')?.value || 'Customer';
  const service = document.getElementById('inv_service')?.value || 'Service';
  const qty = parseFloat(document.getElementById('inv_qty')?.value)||1;
  const price = parseFloat(document.getElementById('inv_price')?.value)||0;
  const gstRate = window._selectedGST !== undefined ? window._selectedGST : 18;
  const discount = parseFloat(document.getElementById('inv_discount')?.value)||0;
  const transport = parseFloat(document.getElementById('inv_transport')?.value)||0;

  if (!price) { showToast('⚠️ Price daalo pehle!'); return; }

  const inv = {
    id: 'INV-' + String(Store.invoices.length + 1).padStart(3,'0'),
    customer, date: new Date().toISOString().slice(0,10),
    items: [{name:service, qty, price, gst:gstRate}],
    discount, transport, status:'Pending'
  };

  Store.invoices.unshift(inv);
  showToast('✅ Invoice + PDF ready!');

  // Generate PDF using jsPDF
  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const c = calcInvoice(inv);

    doc.setFillColor(26, 58, 42);
    doc.rect(0, 0, 210, 35, 'F');
    doc.setTextColor(255,255,255);
    doc.setFontSize(22); doc.setFont(undefined, 'bold');
    doc.text('TENDER MITRA', 15, 18);
    doc.setFontSize(10); doc.setFont(undefined, 'normal');
    doc.text('आपका व्यापार साथी', 15, 26);
    doc.text('GST INVOICE', 170, 18, {align:'right'});

    doc.setTextColor(50,50,50);
    doc.setFontSize(11); doc.setFont(undefined, 'bold');
    doc.text(`Invoice: ${inv.id}`, 15, 50);
    doc.setFont(undefined, 'normal');
    doc.text(`Date: ${inv.date}`, 15, 57);
    doc.text(`Bill To: ${customer}`, 15, 64);
    doc.text(`From: ${Store.user.name}`, 15, 71);
    doc.text(`GST No: ${Store.user.gst}`, 15, 78);

    doc.setFillColor(26,58,42);
    doc.rect(15, 88, 180, 8, 'F');
    doc.setTextColor(255,255,255);
    doc.setFontSize(9);
    doc.text('Description', 18, 94);
    doc.text('Qty', 110, 94);
    doc.text('Rate', 130, 94);
    doc.text('GST%', 152, 94);
    doc.text('Amount', 180, 94, {align:'right'});

    doc.setTextColor(50,50,50);
    doc.setFontSize(10);
    doc.text(service.substring(0,35), 18, 106);
    doc.text(String(qty), 110, 106);
    doc.text('₹'+price, 130, 106);
    doc.text(gstRate+'%', 152, 106);
    doc.text('₹'+(qty*price).toFixed(0), 195, 106, {align:'right'});

    doc.setDrawColor(200,200,200);
    doc.line(15, 112, 195, 112);

    const lines = [
      ['Subtotal', formatCurrency(c.subtotal)],
      [`GST @ ${gstRate}%`, formatCurrency(c.gstAmount)],
      ['Discount', '-'+formatCurrency(c.discount)],
      ['Transport', formatCurrency(c.transport)],
    ];
    let y = 122;
    lines.forEach(([l,v]) => {
      doc.setFontSize(10);
      doc.text(l, 140, y);
      doc.text(v, 195, y, {align:'right'});
      y += 8;
    });

    doc.setFillColor(26,58,42);
    doc.rect(130, y, 65, 10, 'F');
    doc.setTextColor(255,255,255);
    doc.setFont(undefined,'bold');
    doc.setFontSize(11);
    doc.text('TOTAL: '+formatCurrency(c.total), 195, y+7, {align:'right'});

    doc.setTextColor(150,150,150);
    doc.setFont(undefined,'normal');
    doc.setFontSize(8);
    doc.text('Generated by Tender Mitra | www.tendermitra.in', 105, 280, {align:'center'});
    doc.text('This is a computer-generated invoice. No signature required.', 105, 285, {align:'center'});

    doc.save(`${inv.id}_${customer}.pdf`);
  } catch(e) {
    showToast('📄 Invoice saved! PDF library loading...');
  }
  navigate('billing');
}

  return `
  <div class="grid2" style="gap:16px;align-items:start">

          <input class="form-input" id="exp_note" placeholder="Kharche ke baare mein likho">

          <label class="form-label">📅 Date</label>
          <input class="form-input" id="exp_date" type="date" value="${new Date().toISOString().slice(0,10)}">
        </div>
        <button class="btn btn-primary btn-full" onclick="addExpense()">💸 Kharcha Jodon</button>
      </div>

      <div class="card">
        <div class="section-title" style="margin-bottom:14px">📊 Category Summary</div>
        ${cats.filter(c=>totals[c]>0).map(c => `
          <div style="margin-bottom:12px">
            <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px">
              <span style="color:var(--text2)">${catIcons[c]} ${c}</span>
              <span style="font-weight:700;color:var(--text)">${formatCurrency(totals[c])}</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" style="width:${grandTotal>0?Math.round(totals[c]/grandTotal*100):0}%;background:${c==='Fuel'?'#e74c3c':c==='Labour'?'#3498db':c==='Material'?'#f39c12':'#2ecc71'}"></div>
            </div>
          </div>
        `).join('')}
        <div style="display:flex;justify-content:space-between;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">
          <span style="font-weight:700;color:var(--text2)">Total Kharcha</span>
          <span style="font-size:18px;font-weight:800;color:var(--accent4)">${formatCurrency(grandTotal)}</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="section-header">
        <div>
          <div class="section-title">📋 Expense Log</div>
          <div class="section-sub">${Store.expenses.length} entries</div>
        </div>
      </div>
      ${Store.expenses.map(e => `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)">
          <div style="display:flex;align-items:center;gap:10px">

              ${catIcons[e.category]||'💼'}
            </div>
            <div>
              <div style="font-size:13px;font-weight:600;color:var(--text)">${e.category}</div>
              <div style="font-size:11px;color:var(--text3)">${e.note} • ${e.date}</div>

          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <div style="font-size:15px;font-weight:700;color:var(--accent4)">${formatCurrency(e.amount)}</div>
            <button class="btn btn-secondary btn-sm" onclick="deleteExpense('${e.id}')" style="padding:4px 8px">🗑️</button>

function addExpense() {
  const cat = document.getElementById('exp_cat')?.value;
  const amt = parseFloat(document.getElementById('exp_amt')?.value)||0;
  const note = document.getElementById('exp_note')?.value||'';
  const date = document.getElementById('exp_date')?.value||new Date().toISOString().slice(0,10);
  if(!amt) { showToast('⚠️ Amount daalo!'); return; }
  Store.expenses.unshift({id:'EXP-'+Date.now(), category:cat, amount:amt, note, date});
  showToast('✅ Kharcha add ho gaya!');
  navigate('expenses');
}

function deleteExpense(id) {
  Store.expenses = Store.expenses.filter(e=>e.id!==id);
  navigate('expenses');
  showToast('🗑️ Deleted');
}

  Store._tenderFilter[type] = value;

function toggleSave(id) {
  if(Store.savedTenders.includes(id)) {
    Store.savedTenders = Store.savedTenders.filter(x=>x!==id);
    showToast('💔 Removed from saved');
  } else {
    Store.savedTenders.push(id);
    showToast('💛 Tender saved!');
  }
  navigate('tenders');
}

function showTenderGuide(id) {
  showToast('📖 Guide: Register on GeM/eProcure, upload documents, submit bid before deadline!');

          ['Output GST (Sales pe)', formatCurrency(totalGST), 'var(--accent3)'],
          ['Input GST (Purchases pe)', '₹12,400', 'var(--accent5)'],

      <button class="btn btn-secondary btn-sm" onclick="showToast('📊 Exporting to Excel...')">📊 Export</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Invoice</th>
            <th>Customer</th>
            <th>Date</th>
            <th>Subtotal</th>
            <th>GST</th>
            <th>Total</th>
            <th>Status</th>

        </thead>
        <tbody>
          ${Store.invoices.map(inv => {
            const c = calcInvoice(inv);
            return `<tr>

              <td>${inv.date}</td>
              <td>${formatCurrency(c.subtotal)}</td>
              <td style="color:var(--accent3)">${formatCurrency(c.gstAmount)}</td>
              <td style="font-weight:700">${formatCurrency(c.total)}</td>
              <td><span class="badge ${inv.status==='Paid'?'badge-green':'badge-yellow'}">${inv.status}</span></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

function downloadReport() {
  showToast('📥 ITR Summary PDF download ho raha hai...');
  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.setFillColor(26,58,42);
    doc.rect(0,0,210,30,'F');
    doc.setTextColor(255,255,255);
    doc.setFontSize(18); doc.setFont(undefined,'bold');
    doc.text('TENDER MITRA – INCOME TAX SUMMARY', 105, 18, {align:'center'});
    doc.setTextColor(50,50,50);
    doc.setFontSize(12);
    doc.text(`Name: ${Store.user.name}`, 15, 45);
    doc.text(`Business: ${Store.user.business}`, 15, 53);
    doc.text(`GST: ${Store.user.gst}`, 15, 61);
    doc.text(`Period: June 2025`, 15, 69);
    doc.setFontSize(10);
    doc.text('⚠️ Disclaimer: This report is for reference only. Please consult a CA for ITR filing.', 105, 280, {align:'center'});
    doc.save('ITR_Summary_TenderMitra.pdf');
  } catch(e) {}
}

      <div class="login-box">
        <div class="login-logo">🔐</div>
        <div style="font-size:20px;font-weight:800;margin-bottom:6px">OTP Verify Karein</div>
        <div style="font-size:13px;color:var(--text3);margin-bottom:6px">+91 ${Store.phone} pe OTP bheja gaya</div>
        <div style="font-size:12px;color:var(--accent);margin-bottom:20px;cursor:pointer" onclick="Store.loginStep='phone';render()">← Number badlein</div>
        <div class="otp-inputs">
          ${[0,1,2,3,4,5].map(i=>`<input class="otp-input" maxlength="1" id="otp${i}" oninput="otpNext(${i})">`).join('')}
        </div>
        <button class="btn btn-primary btn-full" style="margin-top:16px" onclick="verifyOTP()">✅ Verify & Login</button>
        <div style="font-size:12px;color:var(--text3);margin-top:16px">OTP nahi mila? <span style="color:var(--accent);cursor:pointer" onclick="showToast('📱 OTP resent!')">Resend OTP</span></div>
        <div style="font-size:11px;color:var(--text3);margin-top:8px">Demo ke liye koi bhi 6 digit enter karein</div>
      </div>
    </div>`;
  }
  return `
  <div class="login-screen">
    <div class="login-box">
      <div class="login-logo">🤝</div>
      <div style="font-size:24px;font-weight:800;margin-bottom:4px">Tender Mitra</div>
      <div style="font-size:13px;color:var(--text3);margin-bottom:4px">आपका व्यापार साथी</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:28px">Contractors • Transporters • Suppliers</div>
      <div class="form-group" style="text-align:left">
        <label class="form-label">📱 Mobile Number</label>
        <input class="form-input" id="login_phone" type="tel" maxlength="10" placeholder="10-digit mobile number" style="font-size:16px;letter-spacing:2px;font-family:'JetBrains Mono',monospace">
      </div>
      <button class="btn btn-primary btn-full" style="font-size:15px;padding:14px" onclick="sendOTP()">
        📲 OTP Bhejo
      </button>
      <div class="divider"></div>
      <div style="font-size:12px;color:var(--text3)">
        Login karke aap hamare <span style="color:var(--accent)">Terms & Privacy Policy</span> se agree karte hain
      </div>
      <div style="margin-top:16px;padding:12px;background:var(--bg3);border-radius:10px;font-size:12px;color:var(--text3)">
        🔒 OTP se secure login • Koi password nahi chahiye
      </div>
    </div>
  </div>`;
}

function sendOTP() {
  const phone = document.getElementById('login_phone')?.value;
  if(!phone || phone.length < 10) { showToast('⚠️ Valid 10-digit number daalo'); return; }
  Store.phone = phone;
  Store.loginStep = 'otp';
  showToast('📱 OTP sent to +91 ' + phone);
  render();
  setTimeout(() => document.getElementById('otp0')?.focus(), 100);
}

function otpNext(i) {
  const el = document.getElementById(`otp${i}`);
  if(el?.value.length >= 1 && i < 5) document.getElementById(`otp${i+1}`)?.focus();
}

function verifyOTP() {
  Store.loggedIn = true;
  Store.loginStep = 'phone';
  showToast('🎉 Login successful! Namaste!');
  render();
}

// ─── EVENTS ───────────────────────────────────────────────────────────────────
function attachEvents() {
  // Show menu button on mobile
  const menuBtn = document.getElementById('menuBtn');
  if(menuBtn && window.innerWidth <= 768) menuBtn.style.display = 'flex';
  // Initial preview update
  if(Store.currentPage === 'billing') {
    setTimeout(updatePreview, 100);
  }
}

function toggleSidebar() {
  document.getElementById('sidebar')?.classList.toggle('open');
  document.getElementById('sidebarOverlay')?.classList.toggle('open');
}

function closeSidebar() {
  document.getElementById('sidebar')?.classList.remove('open');
  document.getElementById('sidebarOverlay')?.classList.remove('open');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  const menuBtn = document.getElementById('menuBtn');
  if(menuBtn) menuBtn.style.display = window.innerWidth <= 768 ? 'flex' : 'none';
});

window._selectedGST = 18;
render();
</script>
</body>
</html>
