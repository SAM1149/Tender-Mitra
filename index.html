<!DOCTYPE html>
<html lang="hi-EN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tender Mitra | Professional GST SaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input:focus, select:focus { outline: 2px solid #4f46e5; border-color: transparent; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- UTILITY: NUMBER TO WORDS ---
        function numberToWords(num) {
            const a = ['', 'One ', 'Two ', 'Three ', 'Four ', 'Five ', 'Six ', 'Seven ', 'Eight ', 'Nine ', 'Ten ', 'Eleven ', 'Twelve ', 'Thirteen ', 'Fourteen ', 'Fifteen ', 'Sixteen ', 'Seventeen ', 'Eighteen ', 'Nineteen '];
            const b = ['', '', 'Twenty', 'Thirty', 'Forty', 'Fifty', 'Sixty', 'Seventy', 'Eighty', 'Ninety'];
            if ((num = num.toString()).length > 9) return 'Overflow';
            const n = ('000000000' + num).substr(-9).match(/^(\d{2})(\d{2})(\d{2})(\d{1})(\d{2})$/);
            if (!n) return ''; 
            let str = '';
            str += (n[1] != 0) ? (a[Number(n[1])] || b[n[1][0]] + ' ' + a[n[1][1]]) + 'Crore ' : '';
            str += (n[2] != 0) ? (a[Number(n[2])] || b[n[2][0]] + ' ' + a[n[2][1]]) + 'Lakh ' : '';
            str += (n[3] != 0) ? (a[Number(n[3])] || b[n[3][0]] + ' ' + a[n[3][1]]) + 'Thousand ' : '';
            str += (n[4] != 0) ? (a[Number(n[4])] || b[n[4][0]] + ' ' + a[n[4][1]]) + 'Hundred ' : '';
            str += (n[5] != 0) ? ((str != '') ? 'and ' : '') + (a[Number(n[5])] || b[n[5][0]] + ' ' + a[n[5][1]]) + 'Only' : 'Only';
            return str;
        }

        // --- SUB-COMPONENTS (Defined Outside to prevent Focus Loss) ---
        const HomeView = ({ invoices, setView, setShowBillModal, generatePDF }) => (
            <div className="p-4 space-y-4">
                <div className="bg-white p-6 rounded-3xl shadow-sm border-b-4 border-indigo-600">
                    <p className="text-xs font-bold text-gray-400 uppercase">Total Sales</p>
                    <h2 className="text-3xl font-black text-indigo-900">₹{invoices.reduce((a,b) => a + b.totals.grandTotal, 0).toLocaleString()}</h2>
                </div>
                <div className="grid grid-cols-2 gap-4">
                    <button onClick={() => setShowBillModal(true)} className="bg-white h-32 rounded-3xl shadow-sm border flex flex-col items-center justify-center space-y-2">
                        <div className="bg-green-100 p-3 rounded-full"><i className="fas fa-plus text-green-600"></i></div>
                        <span className="font-bold text-sm">Create Invoice</span>
                    </button>
                    <button onClick={() => setView('profile')} className="bg-white h-32 rounded-3xl shadow-sm border flex flex-col items-center justify-center space-y-2">
                        <div className="bg-indigo-100 p-3 rounded-full"><i className="fas fa-cog text-indigo-600"></i></div>
                        <span className="font-bold text-sm">Profile Set</span>
                    </button>
                </div>
                <h3 className="font-bold text-gray-800">Recent Invoices</h3>
                {invoices.map(inv => (
                    <div key={inv.id} className="bg-white p-4 rounded-2xl border flex justify-between items-center shadow-sm">
                        <div>
                            <p className="font-bold text-sm">{inv.meta.buyerName}</p>
                            <p className="text-[10px] text-gray-400 font-bold uppercase">{inv.meta.invoiceNo} • {inv.meta.date}</p>
                        </div>
                        <button onClick={() => generatePDF(inv.meta, inv.items, inv.totals)} className="text-indigo-600 p-2"><i className="fas fa-download"></i></button>
                    </div>
                ))}
            </div>
        );

        const ProfileView = ({ profile, setProfile, setView }) => (
            <div className="p-4 space-y-4">
                <button onClick={() => setView('home')} className="text-indigo-600 font-bold flex items-center mb-2">
                    <i className="fas fa-arrow-left mr-2"></i> Back to Dashboard
                </button>
                <div className="bg-white p-6 rounded-3xl shadow-lg space-y-4">
                    <h2 className="font-bold text-xl border-b pb-2">Business Identity</h2>
                    <div className="space-y-3">
                        <label className="block">
                            <span className="text-[10px] font-bold text-gray-400 uppercase">Company Name</span>
                            <input value={profile.companyName} onChange={e => setProfile({...profile, companyName: e.target.value})} className="w-full border-b p-2 text-sm" />
                        </label>
                        <label className="block">
                            <span className="text-[10px] font-bold text-gray-400 uppercase">Address</span>
                            <input value={profile.address} onChange={e => setProfile({...profile, address: e.target.value})} className="w-full border-b p-2 text-sm" />
                        </label>
                        <div className="grid grid-cols-2 gap-4">
                            <label className="block">
                                <span className="text-[10px] font-bold text-gray-400 uppercase">GSTIN</span>
                                <input value={profile.gstin} onChange={e => setProfile({...profile, gstin: e.target.value})} className="w-full border-b p-2 text-sm" />
                            </label>
                            <label className="block">
                                <span className="text-[10px] font-bold text-gray-400 uppercase">State Code</span>
                                <input value={profile.stateCode} onChange={e => setProfile({...profile, stateCode: e.target.value})} className="w-full border-b p-2 text-sm" />
                            </label>
                        </div>
                    </div>
                    
                    <h2 className="font-bold text-xl border-b pb-2 pt-4">Bank Details</h2>
                    <div className="space-y-3">
                        <input value={profile.bankName} onChange={e => setProfile({...profile, bankName: e.target.value})} placeholder="Bank Name" className="w-full border-b p-2 text-sm" />
                        <input value={profile.accNo} onChange={e => setProfile({...profile, accNo: e.target.value})} placeholder="Account Number" className="w-full border-b p-2 text-sm" />
                        <input value={profile.ifsc} onChange={e => setProfile({...profile, ifsc: e.target.value})} placeholder="IFSC Code" className="w-full border-b p-2 text-sm" />
                    </div>
                    
                    <button onClick={() => setView('home')} className="w-full bg-indigo-600 text-white p-4 rounded-2xl font-bold shadow-lg mt-6">Save & Exit</button>
                </div>
            </div>
        );

        // --- MAIN APP COMPONENT ---
        function TenderMitra() {
            const [view, setView] = useState('home');
            const [invoices, setInvoices] = useState(() => JSON.parse(localStorage.getItem('tm_invoices_final')) || []);
            const [showBillModal, setShowBillModal] = useState(false);

            const [profile, setProfile] = useState(() => JSON.parse(localStorage.getItem('tm_profile_final')) || {
                companyName: "SAM ENTERPRISES",
                address: "Narnaul, Haryana",
                gstin: "06AAAAA0000A1Z5",
                state: "Haryana",
                stateCode: "06",
                bankName: "AXIS BANK",
                accNo: "91234567890",
                ifsc: "UTIB0001234",
                terms: "Goods once sold will not be taken back.",
                declaration: "We declare that this invoice shows the actual price described."
            });

            const [bill, setBill] = useState({
                invoiceNo: `INV-${Date.now().toString().slice(-4)}`,
                date: new Date().toISOString().split('T')[0],
                buyerName: "",
                buyerGSTIN: "",
                buyerAddress: "",
                buyerStateCode: "",
                shipTo: "",
                placeOfSupply: "Haryana",
                items: [{ id: 1, desc: '', hsn: '', qty: 1, rate: 0, gstRate: 18 }],
                transportCharges: 0,
                packagingCharges: 0,
                totalDiscount: 0
            });

            useEffect(() => localStorage.setItem('tm_profile_final', JSON.stringify(profile)), [profile]);
            useEffect(() => localStorage.setItem('tm_invoices_final', JSON.stringify(invoices)), [invoices]);

            const totals = useMemo(() => {
                let taxableValue = bill.items.reduce((acc, it) => acc + (it.qty * it.rate), 0);
                taxableValue -= Number(bill.totalDiscount);
                const totalGST = bill.items.reduce((acc, it) => acc + ((it.qty * it.rate) * (it.gstRate / 100)), 0);
                const grandTotal = taxableValue + totalGST + Number(bill.transportCharges) + Number(bill.packagingCharges);
                return { taxableValue, cgst: totalGST / 2, sgst: totalGST / 2, grandTotal };
            }, [bill]);

            const generatePDF = (meta, items, calculatedTotals) => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                doc.setFontSize(18); doc.setFont(undefined, 'bold');
                doc.text(profile.companyName, 105, 15, { align: 'center' });
                doc.setFontSize(9); doc.setFont(undefined, 'normal');
                doc.text(`${profile.address} | GSTIN: ${profile.gstin}`, 105, 22, { align: 'center' });
                doc.line(10, 26, 200, 26);
                doc.setFontSize(14); doc.text("TAX INVOICE", 105, 33, { align: 'center' });
                doc.line(10, 36, 200, 36);

                doc.setFontSize(9); doc.setFont(undefined, 'bold');
                doc.text("Bill To:", 12, 45); doc.text("Invoice Details:", 140, 45);
                doc.setFont(undefined, 'normal');
                doc.text(`${meta.buyerName}\n${meta.buyerAddress}\nGSTIN: ${meta.buyerGSTIN}`, 12, 50);
                doc.text(`No: ${meta.invoiceNo}\nDate: ${meta.date}\nSupply: ${meta.placeOfSupply}`, 140, 50);

                doc.autoTable({
                    startY: 70,
                    head: [['S.No', 'Description', 'HSN', 'Qty', 'Unit Price', 'Total']],
                    body: items.map((it, idx) => [idx + 1, it.desc, it.hsn, it.qty, it.rate.toFixed(2), (it.qty * it.rate).toFixed(2)]),
                    theme: 'grid', styles: { fontSize: 8 }
                });

                const fY = doc.lastAutoTable.finalY + 10;
                doc.text(`Amount in words: ${numberToWords(Math.round(calculatedTotals.grandTotal))}`, 12, fY);
                doc.text(`Taxable: Rs.${calculatedTotals.taxableValue.toFixed(2)}`, 140, fY);
                doc.text(`CGST/SGST: Rs.${(calculatedTotals.cgst + calculatedTotals.sgst).toFixed(2)}`, 140, fY + 5);
                doc.setFont(undefined, 'bold');
                doc.text(`Grand Total: Rs.${calculatedTotals.grandTotal.toFixed(2)}`, 140, fY + 12);

                doc.setFont(undefined, 'normal'); doc.setFontSize(7);
                doc.text(`Bank: ${profile.bankName} | A/c: ${profile.accNo} | IFSC: ${profile.ifsc}`, 12, fY + 30);
                doc.text("Save Paper, Save Tree | Jai Hind!", 105, 285, { align: 'center' });
                doc.save(`${meta.invoiceNo}.pdf`);
            };

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col">
                    <header className="bg-white p-4 shadow-sm flex justify-between items-center sticky top-0 z-50">
                        <h1 className="font-black text-indigo-700 italic text-xl">TENDER MITRA</h1>
                        <i className="fas fa-user-circle text-gray-300 text-2xl"></i>
                    </header>

                    <main className="flex-1">
                        {view === 'home' ? (
                            <HomeView 
                                invoices={invoices} 
                                setView={setView} 
                                setShowBillModal={setShowBillModal} 
                                generatePDF={generatePDF} 
                            />
                        ) : (
                            <ProfileView 
                                profile={profile} 
                                setProfile={setProfile} 
                                setView={setView} 
                            />
                        )}
                    </main>

                    {showBillModal && (
                        <div className="fixed inset-0 bg-black/50 z-[100] flex items-end">
                            <div className="bg-white w-full rounded-t-[3rem] p-6 max-h-[90vh] overflow-y-auto no-scrollbar shadow-2xl space-y-4 animate-slideUp">
                                <div className="flex justify-between items-center border-b pb-4">
                                    <h3 className="font-bold text-lg uppercase tracking-widest">New GST Invoice</h3>
                                    <button onClick={() => setShowBillModal(false)} className="text-gray-300 text-3xl p-2">&times;</button>
                                </div>

                                <div className="space-y-3">
                                    <input placeholder="Buyer Name" className="w-full border p-3 rounded-xl text-sm" onChange={e => setBill({...bill, buyerName: e.target.value})} />
                                    <input placeholder="Buyer Address" className="w-full border p-3 rounded-xl text-sm" onChange={e => setBill({...bill, buyerAddress: e.target.value})} />
                                    
                                    <div className="space-y-2 pt-2">
                                        <p className="text-[10px] font-bold text-gray-400 uppercase">Items</p>
                                        {bill.items.map(it => (
                                            <div key={it.id} className="bg-gray-50 p-4 rounded-2xl border border-gray-100 space-y-2">
                                                <input placeholder="Item Description" className="w-full bg-transparent font-bold text-sm" onChange={e => setBill({...bill, items: bill.items.map(x => x.id === it.id ? {...x, desc: e.target.value} : x)})} />
                                                <div className="grid grid-cols-3 gap-2">
                                                    <input placeholder="HSN" className="border-b bg-transparent text-xs p-1" onChange={e => setBill({...bill, items: bill.items.map(x => x.id === it.id ? {...x, hsn: e.target.value} : x)})} />
                                                    <input type="number" placeholder="Qty" className="border-b bg-transparent text-xs p-1" onChange={e => setBill({...bill, items: bill.items.map(x => x.id === it.id ? {...x, qty: Number(e.target.value)} : x)})} />
                                                    <input type="number" placeholder="Rate" className="border-b bg-transparent text-xs p-1" onChange={e => setBill({...bill, items: bill.items.map(x => x.id === it.id ? {...x, rate: Number(e.target.value)} : x)})} />
                                                </div>
                                            </div>
                                        ))}
                                        <button onClick={() => setBill({...bill, items: [...bill.items, { id: Date.now(), desc: '', hsn: '', qty: 1, rate: 0, gstRate: 18 }]})} className="text-xs text-indigo-700 font-bold p-1">+ Add Item</button>
                                    </div>

                                    <div className="bg-indigo-700 text-white p-6 rounded-[2.5rem] shadow-xl flex justify-between items-center mt-4">
                                        <div>
                                            <p className="text-[10px] opacity-70">Payable Amount</p>
                                            <h2 className="text-2xl font-black">₹{totals.grandTotal.toLocaleString()}</h2>
                                        </div>
                                        <button onClick={() => {
                                            const newInv = { meta: bill, items: bill.items, totals, id: Date.now() };
                                            setInvoices([newInv, ...invoices]);
                                            generatePDF(bill, bill.items, totals);
                                            setShowBillModal(false);
                                        }} className="bg-yellow-400 text-indigo-900 px-6 py-4 rounded-2xl font-black text-xs uppercase active:scale-95 transition-all">Download</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TenderMitra />);
    </script>
</body>
</html>
