<!DOCTYPE html>
<html lang="hi-EN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tender Mitra Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .modal-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function TenderMitra() {
            const [view, setView] = useState('home'); 
            const [invoices, setInvoices] = useState([]);
            const [showBillModal, setShowBillModal] = useState(false);
            const [userProfile, setUserProfile] = useState({
                name: "Your Business Name",
                address: "Narnaul, Haryana",
                gstin: "",
                logo: null
            });

            // Bill Form State
            const [form, setForm] = useState({
                cust: '', item: '', qty: 1, price: 0, 
                gst: 18, discount: 0, transport: 0
            });

            // Calculation Logic
            const calc = () => {
                const subtotal = (form.qty * form.price) - form.discount;
                const gstAmount = subtotal * (form.gst / 100);
                return subtotal + gstAmount + Number(form.transport);
            };

            const handleLogoUpload = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onloadend = () => setUserProfile({...userProfile, logo: reader.result});
                if(file) reader.readAsDataURL(file);
            };

            const downloadPDF = (inv) => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                doc.setFontSize(20);
                doc.text(userProfile.name, 10, 20);
                doc.setFontSize(10);
                doc.text(`Address: ${userProfile.address}`, 10, 28);
                doc.text(`GSTIN: ${userProfile.gstin}`, 10, 34);
                
                doc.line(10, 40, 200, 40);
                doc.text(`Bill To: ${inv.cust}`, 10, 50);
                doc.text(`Date: ${inv.date}`, 150, 50);

                doc.text("Item", 10, 70);
                doc.text("Qty", 70, 70);
                doc.text("Rate", 100, 70);
                doc.text("Total", 160, 70);
                
                doc.text(inv.item, 10, 80);
                doc.text(String(inv.qty), 70, 80);
                doc.text(`Rs.${inv.price}`, 100, 80);
                doc.text(`Rs.${inv.total.toFixed(2)}`, 160, 80);

                doc.text(`Other Charges: Rs.${inv.transport}`, 140, 100);
                doc.text(`Discount: Rs.${inv.discount}`, 140, 110);
                doc.setFontSize(14);
                doc.text(`Final Total: Rs.${inv.total.toFixed(2)}`, 140, 125);

                doc.save(`Bill_${inv.cust}_${Date.now()}.pdf`);
            };

            const saveBill = () => {
                const newBill = { ...form, total: calc(), date: new Date().toLocaleDateString(), id: Date.now() };
                setInvoices([newBill, ...invoices]);
                downloadPDF(newBill);
                setShowBillModal(false);
            };

            // Views
            const Home = () => (
                <div className="p-4 space-y-4">
                    <div className="bg-gradient-to-r from-indigo-600 to-blue-500 p-6 rounded-3xl text-white shadow-lg">
                        <div className="flex justify-between items-center">
                            <div>
                                <h2 className="text-lg opacity-80">Total Sales</h2>
                                <h1 className="text-3xl font-bold">₹{invoices.reduce((a,b)=>a+b.total,0).toFixed(0)}</h1>
                            </div>
                            {userProfile.logo && <img src={userProfile.logo} className="w-16 h-16 rounded-full border-2 border-white object-cover" />}
                        </div>
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                        <button onClick={()=>setShowBillModal(true)} className="bg-white p-4 rounded-2xl border flex flex-col items-center shadow-sm active:bg-gray-50">
                            <i className="fas fa-plus-circle text-2xl text-green-500 mb-2"></i>
                            <span className="font-bold text-sm text-gray-700">Bill Banaye</span>
                        </button>
                        <button onClick={()=>setView('profile')} className="bg-white p-4 rounded-2xl border flex flex-col items-center shadow-sm active:bg-gray-50">
                            <i className="fas fa-user-cog text-2xl text-blue-500 mb-2"></i>
                            <span className="font-bold text-sm text-gray-700">Profile Set</span>
                        </button>
                    </div>

                    <h3 className="font-bold text-gray-800 mt-6">Purane Bills (Recent)</h3>
                    {invoices.map(inv => (
                        <div key={inv.id} className="bg-white p-4 rounded-xl border flex justify-between items-center">
                            <div>
                                <p className="font-bold text-gray-800">{inv.cust}</p>
                                <p className="text-[10px] text-gray-400">{inv.date} | {inv.item}</p>
                            </div>
                            <button onClick={()=>downloadPDF(inv)} className="text-indigo-600">
                                <i className="fas fa-download text-lg"></i>
                            </button>
                        </div>
                    ))}
                </div>
            );

            const Profile = () => (
                <div className="p-4 space-y-4">
                    <button onClick={()=>setView('home')} className="text-indigo-600 font-bold mb-4 italic underline">← Wapas Jaye (Back)</button>
                    <div className="bg-white p-6 rounded-2xl shadow-sm space-y-4">
                        <h2 className="font-bold text-xl mb-4 text-center">Business Profile</h2>
                        <div>
                            <label className="text-xs font-bold text-gray-500">Logo Upload Karein</label>
                            <input type="file" onChange={handleLogoUpload} className="w-full text-xs mt-1" />
                        </div>
                        <input value={userProfile.name} onChange={e=>setUserProfile({...userProfile, name: e.target.value})} className="w-full border p-3 rounded-lg text-sm" placeholder="Business Name" />
                        <input value={userProfile.address} onChange={e=>setUserProfile({...userProfile, address: e.target.value})} className="w-full border p-3 rounded-lg text-sm" placeholder="Address" />
                        <input value={userProfile.gstin} onChange={e=>setUserProfile({...userProfile, gstin: e.target.value})} className="w-full border p-3 rounded-lg text-sm" placeholder="GST Number (Optional)" />
                        <button onClick={()=>setView('home')} className="w-full bg-indigo-600 text-white p-3 rounded-xl font-bold">Details Save Karein</button>
                    </div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen bg-gray-50 pb-24">
                    <div className="bg-white p-4 border-b sticky top-0 z-20 flex items-center justify-between">
                        <h1 className="text-indigo-700 font-extrabold text-xl tracking-tighter">TENDER MITRA <span className="text-xs text-orange-500">PRO</span></h1>
                        <i className="fas fa-bell text-gray-400"></i>
                    </div>

                    {view === 'home' && <Home />}
                    {view === 'profile' && <Profile />}

                    {/* BILL MODAL */}
                    {showBillModal && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-end">
                            <div className="bg-white w-full rounded-t-[2.5rem] p-6 space-y-4 modal-up max-h-[90vh] overflow-y-auto shadow-2xl">
                                <div className="flex justify-between items-center mb-2">
                                    <h3 className="font-bold text-xl">Naya Bill</h3>
                                    <button onClick={()=>setShowBillModal(false)} className="bg-gray-100 px-3 py-1 rounded-full text-gray-400">&times;</button>
                                </div>
                                
                                <input placeholder="Grahak Ka Naam (Customer)" className="w-full border p-3 rounded-xl text-sm bg-gray-50" onChange={e=>setForm({...form, cust: e.target.value})} />
                                <input placeholder="Kaam Ka Naam (Item/Work)" className="w-full border p-3 rounded-xl text-sm bg-gray-50" onChange={e=>setForm({...form, item: e.target.value})} />
                                
                                <div className="grid grid-cols-2 gap-3">
                                    <div>
                                        <label className="text-[10px] font-bold text-gray-400 ml-1">Quantity</label>
                                        <input type="number" value={form.qty} className="w-full border p-3 rounded-xl text-sm" onChange={e=>setForm({...form, qty: Number(e.target.value)})} />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-gray-400 ml-1">Rate (Price)</label>
                                        <input type="number" placeholder="₹" className="w-full border p-3 rounded-xl text-sm font-bold text-blue-600" onChange={e=>setForm({...form, price: Number(e.target.value)})} />
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-3">
                                    <div className="relative">
                                        <label className="text-[10px] font-bold text-red-400 ml-1">Discount (-)</label>
                                        <input type="number" placeholder="₹" className="w-full border p-3 rounded-xl text-sm" onChange={e=>setForm({...form, discount: Number(e.target.value)})} />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-green-600 ml-1">Transport Charges (+)</label>
                                        <input type="number" placeholder="₹" className="w-full border p-3 rounded-xl text-sm" onChange={e=>setForm({...form, transport: Number(e.target.value)})} />
                                    </div>
                                </div>

                                <div className="flex gap-3">
                                    <select className="flex-1 border p-3 rounded-xl text-sm bg-gray-50 font-bold" onChange={e=>setForm({...form, gst: Number(e.target.value)})}>
                                        <option value="18">GST 18%</option>
                                        <option value="12">GST 12%</option>
                                        <option value="5">GST 5%</option>
                                        <option value="0">No GST</option>
                                    </select>
                                </div>

                                <div className="bg-indigo-700 text-white p-5 rounded-2xl flex justify-between items-center">
                                    <div>
                                        <p className="text-[10px] opacity-70 italic font-medium">Final Total (Tax Included)</p>
                                        <p className="text-2xl font-bold">₹{calc().toFixed(2)}</p>
                                    </div>
                                    <button onClick={saveBill} className="bg-white text-indigo-700 px-6 py-3 rounded-xl font-bold active:scale-90 transition-transform">
                                        <i className="fas fa-file-pdf mr-2"></i>Download
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TenderMitra />);
    </script>
</body>
</html>
