<!DOCTYPE html>
<html lang="hi-EN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tender Mitra | Pro Billing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input:focus, select:focus { outline: none; border-color: #4f46e5; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function numberToWords(num) {
            const a = ['', 'One ', 'Two ', 'Three ', 'Four ', 'Five ', 'Six ', 'Seven ', 'Eight ', 'Nine ', 'Ten ', 'Eleven ', 'Twelve ', 'Thirteen ', 'Fourteen ', 'Fifteen ', 'Sixteen ', 'Seventeen ', 'Eighteen ', 'Nineteen '];
            const b = ['', '', 'Twenty', 'Thirty', 'Forty', 'Fifty', 'Sixty', 'Seventy', 'Eighty', 'Ninety'];
            if ((num = num.toString()).length > 9) return 'Overflow';
            const n = ('000000000' + num).substr(-9).match(/^(\d{2})(\d{2})(\d{2})(\d{1})(\d{2})$/);
            if (!n) return ''; 
            let str = '';
            str += (n[1] != 0) ? (a[Number(n[1])] || b[n[1][0]] + ' ' + a[n[1][1]]) + 'Crore ' : '';
            str += (n[2] != 0) ? (a[Number(n[2])] || b[n[2][0]] + ' ' + a[n[2][1]]) + 'Lakh ' : '';
            str += (n[3] != 0) ? (a[Number(n[3])] || b[n[3][0]] + ' ' + a[n[3][1]]) + 'Thousand ' : '';
            str += (n[4] != 0) ? (a[Number(n[4])] || b[n[4][0]] + ' ' + a[n[4][1]]) + 'Hundred ' : '';
            str += (n[5] != 0) ? ((str != '') ? 'and ' : '') + (a[Number(n[5])] || b[n[5][0]] + ' ' + a[n[5][1]]) + 'Only' : 'Only';
            return str;
        }

        function TenderMitra() {
            const [view, setView] = useState('home');
            const [showBillModal, setShowBillModal] = useState(false);
            const [invoices, setInvoices] = useState(() => JSON.parse(localStorage.getItem('tm_inv_v6')) || []);
            
            const [profile, setProfile] = useState(() => JSON.parse(localStorage.getItem('tm_prof_v6')) || {
                companyName: "SAM ENTERPRISES",
                address: "Narnaul, Haryana",
                gstin: "06AAAAA0000A1Z5",
                stateCode: "06",
                bankName: "AXIS BANK",
                accNo: "91234567890",
                ifsc: "UTIB0001234",
                logo: "",
                signature: ""
            });

            const [bill, setBill] = useState({
                invoiceNo: `INV-${Date.now().toString().slice(-4)}`,
                date: new Date().toISOString().split('T')[0],
                buyerName: "",
                buyerAddress: "",
                buyerGSTIN: "",
                placeOfSupply: "Haryana",
                items: [{ id: Date.now(), desc: '', hsn: '', qty: 1, rate: 0, gstRate: 18 }],
                discount: 0,
                transportCharges: 0
            });

            useEffect(() => { localStorage.setItem('tm_prof_v6', JSON.stringify(profile)); }, [profile]);
            useEffect(() => { localStorage.setItem('tm_inv_v6', JSON.stringify(invoices)); }, [invoices]);

            const handleProfileChange = (field, value) => setProfile(prev => ({ ...prev, [field]: value }));
            const handleBillChange = (field, value) => setBill(prev => ({ ...prev, [field]: value }));
            const handleItemChange = (id, field, value) => {
                setBill(prev => ({ ...prev, items: prev.items.map(it => it.id === id ? { ...it, [field]: value } : it) }));
            };

            const handleImageUpload = (field, e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => handleProfileChange(field, reader.result);
                    reader.readAsDataURL(file);
                }
            };

            const totals = useMemo(() => {
                let taxableValue = bill.items.reduce((acc, it) => acc + (it.qty * it.rate), 0) - Number(bill.discount);
                const totalGST = bill.items.reduce((acc, it) => acc + ((it.qty * it.rate) * (it.gstRate / 100)), 0);
                const grandTotal = taxableValue + totalGST + Number(bill.transportCharges);
                return { taxableValue, cgst: totalGST / 2, sgst: totalGST / 2, grandTotal };
            }, [bill]);

            const generatePDF = (invoiceData, calcTotals) => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
                
                if (profile.logo) doc.addImage(profile.logo, 12, 10, 35, 18);

                doc.setFontSize(18); doc.setFont(undefined, 'bold');
                doc.text(profile.companyName, 105, 16, { align: 'center' });
                doc.setFontSize(9); doc.setFont(undefined, 'normal');
                doc.text(`${profile.address} | GSTIN: ${profile.gstin}`, 105, 23, { align: 'center' });
                doc.line(10, 30, 200, 30);
                doc.setFontSize(14); doc.text("TAX INVOICE", 105, 37, { align: 'center' });
                doc.line(10, 40, 200, 40);

                doc.setFontSize(9); doc.setFont(undefined, 'bold');
                doc.text("Bill To:", 12, 48); doc.text("Invoice Details:", 140, 48);
                doc.setFont(undefined, 'normal');
                doc.text(`${invoiceData.buyerName}\n${invoiceData.buyerAddress}\nGSTIN: ${invoiceData.buyerGSTIN}`, 12, 53);
                doc.text(`No: ${invoiceData.invoiceNo}\nDate: ${invoiceData.date}\nSupply: ${invoiceData.placeOfSupply}`, 140, 53);

                doc.autoTable({
                    startY: 75,
                    head: [['S.No', 'Description', 'HSN', 'Qty', 'Rate', 'GST %', 'Total']],
                    body: invoiceData.items.map((it, idx) => [
                        idx + 1, 
                        it.desc, 
                        it.hsn, 
                        it.qty, 
                        it.rate.toFixed(2), 
                        `${it.gstRate}%`,
                        ((it.qty * it.rate) + (it.qty * it.rate * it.gstRate / 100)).toFixed(2)
                    ]),
                    theme: 'grid', styles: { fontSize: 8 },
                    headStyles: { fillColor: [79, 70, 229] }
                });

                const fY = doc.lastAutoTable.finalY + 10;
                doc.text(`Amount in words: ${numberToWords(Math.round(calcTotals.grandTotal))}`, 12, fY);
                doc.text(`Taxable: Rs.${calcTotals.taxableValue.toFixed(2)}`, 140, fY);
                doc.text(`CGST/SGST: Rs.${(calcTotals.cgst + calcTotals.sgst).toFixed(2)}`, 140, fY + 5);
                doc.setFont(undefined, 'bold');
                doc.text(`Grand Total: Rs.${calcTotals.grandTotal.toFixed(2)}`, 140, fY + 12);

                doc.setFont(undefined, 'normal'); doc.setFontSize(8);
                doc.text(`Bank Details: ${profile.bankName} | A/c: ${profile.accNo} | IFSC: ${profile.ifsc}`, 12, fY + 35);

                if (profile.signature) doc.addImage(profile.signature, 150, fY + 35, 35, 15);
                doc.line(145, fY + 52, 195, fY + 52);
                doc.text("Authorized Signatory", 152, fY + 57);
                doc.text("Save Paper, Save Tree | Jai Hind!", 105, 285, { align: 'center' });
                
                doc.save(`${invoiceData.invoiceNo}.pdf`);
            };

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col bg-gray-50">
                    <header className="bg-white p-4 shadow-sm flex justify-between items-center sticky top-0 z-50">
                        <h1 className="font-black text-indigo-700 italic text-xl">TENDER MITRA</h1>
                        <button onClick={() => setView(view === 'home' ? 'profile' : 'home')} className="bg-indigo-50 text-indigo-700 px-4 py-1 rounded-full text-xs font-bold">
                            {view === 'home' ? 'My Details' : 'Back'}
                        </button>
                    </header>

                    <main className="flex-1 p-4 space-y-4">
                        {view === 'home' ? (
                            <>
                                <div className="bg-white p-6 rounded-3xl shadow-sm border-b-4 border-indigo-600">
                                    <p className="text-xs font-bold text-gray-400 uppercase">Total Sales</p>
                                    <h2 className="text-3xl font-black text-indigo-900">₹{invoices.reduce((a,b) => a + b.totals.grandTotal, 0).toLocaleString()}</h2>
                                </div>
                                <button onClick={() => setShowBillModal(true)} className="w-full bg-white h-24 rounded-3xl shadow-sm border flex items-center justify-center space-x-3 active:scale-95 transition-transform">
                                    <div className="bg-green-100 p-3 rounded-full"><i className="fas fa-plus text-green-600"></i></div>
                                    <span className="font-bold text-lg text-gray-700">Create New Invoice</span>
                                </button>
                                <h3 className="font-bold text-gray-800 pt-2">Recent Invoices</h3>
                                {invoices.map(inv => (
                                    <div key={inv.id} className="bg-white p-4 rounded-2xl border flex justify-between items-center shadow-sm">
                                        <div>
                                            <p className="font-bold text-sm">{inv.meta.buyerName || 'Unnamed Buyer'}</p>
                                            <p className="text-[10px] text-gray-400 font-bold">{inv.meta.invoiceNo} • {inv.meta.date}</p>
                                        </div>
                                        <button onClick={() => generatePDF(inv.meta, inv.totals)} className="text-indigo-600 p-2"><i className="fas fa-download"></i></button>
                                    </div>
                                ))}
                            </>
                        ) : (
                            <div className="bg-white p-6 rounded-3xl shadow-lg space-y-4">
                                <h2 className="font-bold text-xl border-b pb-2">Business Settings</h2>
                                <div className="grid grid-cols-2 gap-4">
                                    <label className="block border-2 border-dashed rounded-xl p-3 text-center cursor-pointer">
                                        <span className="text-[10px] font-bold text-gray-400 block">LOGO</span>
                                        <input type="file" accept="image/*" onChange={(e) => handleImageUpload('logo', e)} className="hidden" />
                                        {profile.logo && <img src={profile.logo} className="h-10 mx-auto mt-1" />}
                                    </label>
                                    <label className="block border-2 border-dashed rounded-xl p-3 text-center cursor-pointer">
                                        <span className="text-[10px] font-bold text-gray-400 block">SIGN</span>
                                        <input type="file" accept="image/*" onChange={(e) => handleImageUpload('signature', e)} className="hidden" />
                                        {profile.signature && <img src={profile.signature} className="h-10 mx-auto mt-1" />}
                                    </label>
                                </div>
                                <input placeholder="Company Name" value={profile.companyName} onChange={e => handleProfileChange('companyName', e.target.value)} className="w-full border-b p-2 text-sm" />
                                <input placeholder="Address" value={profile.address} onChange={e => handleProfileChange('address', e.target.value)} className="w-full border-b p-2 text-sm" />
                                <div className="grid grid-cols-2 gap-4">
                                    <input placeholder="GSTIN" value={profile.gstin} onChange={e => handleProfileChange('gstin', e.target.value)} className="w-full border-b p-2 text-sm" />
                                    <input placeholder="Bank Name" value={profile.bankName} onChange={e => handleProfileChange('bankName', e.target.value)} className="w-full border-b p-2 text-sm" />
                                </div>
                                <button onClick={() => setView('home')} className="w-full bg-indigo-600 text-white p-4 rounded-2xl font-bold mt-4 shadow-lg">Save Details</button>
                            </div>
                        )}
                    </main>

                    {showBillModal && (
                        <div className="fixed inset-0 bg-black/60 z-[100] flex items-end">
                            <div className="bg-white w-full rounded-t-[3rem] p-6 max-h-[90vh] overflow-y-auto no-scrollbar shadow-2xl space-y-4">
                                <div className="flex justify-between items-center border-b pb-4">
                                    <h3 className="font-bold text-lg uppercase">New GST Invoice</h3>
                                    <button onClick={() => setShowBillModal(false)} className="text-gray-400 text-3xl">&times;</button>
                                </div>

                                <div className="space-y-3">
                                    <input placeholder="Buyer Name" value={bill.buyerName} onChange={e => handleBillChange('buyerName', e.target.value)} className="w-full border p-3 rounded-xl text-sm" />
                                    <input placeholder="Buyer Address" value={bill.buyerAddress} onChange={e => handleBillChange('buyerAddress', e.target.value)} className="w-full border p-3 rounded-xl text-sm" />
                                    <input placeholder="Buyer GSTIN" value={bill.buyerGSTIN} onChange={e => handleBillChange('buyerGSTIN', e.target.value)} className="w-full border p-3 rounded-xl text-sm" />
                                    
                                    <p className="text-[10px] font-bold text-gray-400 uppercase">Items</p>
                                    {bill.items.map(it => (
                                        <div key={it.id} className="bg-gray-50 p-4 rounded-2xl border space-y-2 relative">
                                            {bill.items.length > 1 && (
                                                <button onClick={() => setBill(p => ({...p, items: p.items.filter(x => x.id !== it.id)}))} className="absolute top-2 right-2 text-red-500">&times;</button>
                                            )}
                                            <input placeholder="Description" value={it.desc} onChange={e => handleItemChange(it.id, 'desc', e.target.value)} className="w-full bg-transparent font-bold text-sm border-b p-1" />
                                            <div className="grid grid-cols-4 gap-2">
                                                <input placeholder="HSN" value={it.hsn} onChange={e => handleItemChange(it.id, 'hsn', e.target.value)} className="bg-transparent text-xs border-b p-1" />
                                                <input type="number" placeholder="Qty" value={it.qty} onChange={e => handleItemChange(it.id, 'qty', Number(e.target.value))} className="bg-transparent text-xs border-b p-1" />
                                                <input type="number" placeholder="Rate" value={it.rate} onChange={e => handleItemChange(it.id, 'rate', Number(e.target.value))} className="bg-transparent text-xs border-b p-1" />
                                                <select value={it.gstRate} onChange={e => handleItemChange(it.id, 'gstRate', Number(e.target.value))} className="bg-transparent text-[10px] border-b p-1">
                                                    <option value="0">0%</option>
                                                    <option value="5">5%</option>
                                                    <option value="12">12%</option>
                                                    <option value="18">18%</option>
                                                    <option value="28">28%</option>
                                                </select>
                                            </div>
                                        </div>
                                    ))}
                                    <button onClick={() => setBill(p => ({...p, items: [...p.items, { id: Date.now(), desc: '', hsn: '', qty: 1, rate: 0, gstRate: 18 }]}))} className="text-xs text-indigo-700 font-bold">+ Add Item</button>
                                    
                                    <div className="grid grid-cols-2 gap-4 pt-2">
                                        <input type="number" placeholder="Discount (-)" value={bill.discount} onChange={e => handleBillChange('discount', Number(e.target.value))} className="border p-3 rounded-xl text-sm" />
                                        <input type="number" placeholder="Transport (+)" value={bill.transportCharges} onChange={e => handleBillChange('transportCharges', Number(e.target.value))} className="border p-3 rounded-xl text-sm" />
                                    </div>

                                    <div className="bg-indigo-700 text-white p-6 rounded-[2.5rem] flex justify-between items-center mt-4">
                                        <div>
                                            <p className="text-[10px] opacity-70">Grand Total</p>
                                            <h2 className="text-2xl font-black">₹{totals.grandTotal.toLocaleString()}</h2>
                                        </div>
                                        <button onClick={() => {
                                            const newInv = { meta: bill, totals, id: Date.now() };
                                            setInvoices([newInv, ...invoices]);
                                            generatePDF(bill, totals);
                                            setShowBillModal(false);
                                        }} className="bg-yellow-400 text-indigo-900 px-6 py-4 rounded-2xl font-black text-xs uppercase shadow-md">Download</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TenderMitra />);
    </script>
</body>
</html>
