<!DOCTYPE html>
<html lang="hi-EN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tender Mitra | Pro Billing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input:focus, select:focus { border-color: #4f46e5; ring: 2px; ring-color: #c7d2fe; }
        .input-label { font-size: 10px; font-weight: 700; color: #6366f1; text-transform: uppercase; margin-bottom: 2px; display: block; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Utility: Number to Words (Indian System)
        function numberToWords(num) {
            const a = ['', 'One ', 'Two ', 'Three ', 'Four ', 'Five ', 'Six ', 'Seven ', 'Eight ', 'Nine ', 'Ten ', 'Eleven ', 'Twelve ', 'Thirteen ', 'Fourteen ', 'Fifteen ', 'Sixteen ', 'Seventeen ', 'Eighteen ', 'Nineteen '];
            const b = ['', '', 'Twenty', 'Thirty', 'Forty', 'Fifty', 'Sixty', 'Seventy', 'Eighty', 'Ninety'];
            if ((num = num.toString()).length > 9) return 'Overflow';
            const n = ('000000000' + num).substr(-9).match(/^(\d{2})(\d{2})(\d{2})(\d{1})(\d{2})$/);
            if (!n) return ''; 
            let str = '';
            str += (n[1] != 0) ? (a[Number(n[1])] || b[n[1][0]] + ' ' + a[n[1][1]]) + 'Crore ' : '';
            str += (n[2] != 0) ? (a[Number(n[2])] || b[n[2][0]] + ' ' + a[n[2][1]]) + 'Lakh ' : '';
            str += (n[3] != 0) ? (a[Number(n[3])] || b[n[3][0]] + ' ' + a[n[3][1]]) + 'Thousand ' : '';
            str += (n[4] != 0) ? (a[Number(n[4])] || b[n[4][0]] + ' ' + a[n[4][1]]) + 'Hundred ' : '';
            str += (n[5] != 0) ? ((str != '') ? 'and ' : '') + (a[Number(n[5])] || b[n[5][0]] + ' ' + a[n[5][1]]) + 'Only' : 'Only';
            return str;
        }

        function TenderMitra() {
            const [view, setView] = useState('home');
            const [showBillModal, setShowBillModal] = useState(false);
            const [invoices, setInvoices] = useState(() => JSON.parse(localStorage.getItem('tm_inv_v6')) || []);
            
            const [profile, setProfile] = useState(() => JSON.parse(localStorage.getItem('tm_prof_v6')) || {
                companyName: "SAM ENTERPRISES",
                address: "Narnaul, Haryana",
                gstin: "06AAAAA0000A1Z5",
                stateCode: "06",
                bankName: "AXIS BANK",
                accNo: "91234567890",
                ifsc: "UTIB0001234",
                logo: "",
                signature: ""
            });

            const [bill, setBill] = useState({
                invoiceNo: `INV-${Date.now().toString().slice(-4)}`,
                date: new Date().toISOString().split('T')[0],
                buyerName: "",
                buyerAddress: "",
                buyerGSTIN: "",
                placeOfSupply: "Haryana",
                items: [{ id: Date.now(), desc: '', hsn: '', qty: 1, rate: 0, gstRate: 18 }],
                discount: 0,
                transportCharges: 0
            });

            useEffect(() => { localStorage.setItem('tm_prof_v6', JSON.stringify(profile)); }, [profile]);
            useEffect(() => { localStorage.setItem('tm_inv_v6', JSON.stringify(invoices)); }, [invoices]);

            const handleProfileChange = (field, value) => setProfile(prev => ({ ...prev, [field]: value }));
            const handleBillChange = (field, value) => setBill(prev => ({ ...prev, [field]: value }));
            const handleItemChange = (id, field, value) => {
                setBill(prev => ({ ...prev, items: prev.items.map(it => it.id === id ? { ...it, [field]: value } : it) }));
            };

            const totals = useMemo(() => {
                let taxableValue = bill.items.reduce((acc, it) => acc + (it.qty * it.rate), 0) - Number(bill.discount);
                const totalGST = bill.items.reduce((acc, it) => acc + ((it.qty * it.rate) * (it.gstRate / 100)), 0);
                const grandTotal = taxableValue + totalGST + Number(bill.transportCharges);
                return { taxableValue, cgst: totalGST / 2, sgst: totalGST / 2, grandTotal };
            }, [bill]);

            const generatePDF = (invoiceData, calcTotals) => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
                if (profile.logo) doc.addImage(profile.logo, 12, 10, 35, 18);
                doc.setFontSize(18); doc.setFont(undefined, 'bold');
                doc.text(profile.companyName, 105, 16, { align: 'center' });
                doc.setFontSize(9); doc.setFont(undefined, 'normal');
                doc.text(`${profile.address} | GSTIN: ${profile.gstin}`, 105, 23, { align: 'center' });
                doc.line(10, 30, 200, 30);
                doc.setFontSize(14); doc.text("TAX INVOICE", 105, 37, { align: 'center' });
                doc.line(10, 40, 200, 40);
                doc.setFontSize(9); doc.setFont(undefined, 'bold');
                doc.text("Bill To:", 12, 48); doc.text("Invoice Details:", 140, 48);
                doc.setFont(undefined, 'normal');
                doc.text(`${invoiceData.buyerName}\n${invoiceData.buyerAddress}\nGSTIN: ${invoiceData.buyerGSTIN}`, 12, 53);
                doc.text(`No: ${invoiceData.invoiceNo}\nDate: ${invoiceData.date}\nSupply: ${invoiceData.placeOfSupply}`, 140, 53);
                doc.autoTable({
                    startY: 75,
                    head: [['S.No', 'Description', 'HSN', 'Qty', 'Rate', 'GST %', 'Total']],
                    body: invoiceData.items.map((it, idx) => [
                        idx + 1, it.desc, it.hsn, it.qty, it.rate.toFixed(2), `${it.gstRate}%`,
                        ((it.qty * it.rate) * (1 + it.gstRate/100)).toFixed(2)
                    ]),
                    theme: 'grid', styles: { fontSize: 8 },
                    headStyles: { fillColor: [79, 70, 229] }
                });
                const fY = doc.lastAutoTable.finalY + 10;
                doc.text(`Amount in words: ${numberToWords(Math.round(calcTotals.grandTotal))}`, 12, fY);
                doc.text(`Taxable: Rs.${calcTotals.taxableValue.toFixed(2)}`, 140, fY);
                doc.text(`GST Total: Rs.${(calcTotals.cgst + calcTotals.sgst).toFixed(2)}`, 140, fY + 5);
                doc.setFont(undefined, 'bold');
                doc.text(`Grand Total: Rs.${calcTotals.grandTotal.toFixed(2)}`, 140, fY + 12);
                if (profile.signature) doc.addImage(profile.signature, 150, fY + 35, 35, 15);
                doc.setFont(undefined, 'normal');
                doc.text("Authorized Signatory", 152, fY + 57);
                doc.save(`${invoiceData.invoiceNo}.pdf`);
            };

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col bg-gray-50 pb-10">
                    <header className="bg-white p-4 shadow-sm flex justify-between items-center sticky top-0 z-50">
                        <h1 className="font-black text-indigo-700 italic text-xl">TENDER MITRA</h1>
                        <button onClick={() => setView(view === 'home' ? 'profile' : 'home')} className="bg-indigo-50 text-indigo-700 px-4 py-1 rounded-full text-xs font-bold">
                            {view === 'home' ? 'My Details' : 'Back'}
                        </button>
                    </header>

                    <main className="flex-1 p-4">
                        {view === 'home' ? (
                            <div className="space-y-4">
                                <div className="bg-white p-6 rounded-3xl shadow-sm border-b-4 border-indigo-600">
                                    <p className="text-xs font-bold text-gray-400 uppercase">Total Sales</p>
                                    <h2 className="text-3xl font-black text-indigo-900">₹{invoices.reduce((a,b) => a + b.totals.grandTotal, 0).toLocaleString()}</h2>
                                </div>
                                <button onClick={() => setShowBillModal(true)} className="w-full bg-white h-24 rounded-3xl shadow-sm border flex items-center justify-center space-x-3 active:scale-95 transition-transform">
                                    <div className="bg-green-100 p-3 rounded-full"><i className="fas fa-plus text-green-600"></i></div>
                                    <span className="font-bold text-lg text-gray-700">Create New Invoice</span>
                                </button>
                                <h3 className="font-bold text-gray-800 pt-2">Recent Invoices</h3>
                                {invoices.map(inv => (
                                    <div key={inv.id} className="bg-white p-4 rounded-2xl border flex justify-between items-center shadow-sm">
                                        <div><p className="font-bold text-sm">{inv.meta.buyerName || 'Client'}</p><p className="text-[10px] text-gray-400 font-bold">{inv.meta.invoiceNo}</p></div>
                                        <button onClick={() => generatePDF(inv.meta, inv.totals)} className="text-indigo-600 p-2"><i className="fas fa-download"></i></button>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="bg-white p-6 rounded-3xl shadow-lg space-y-4">
                                <h2 className="font-bold text-xl border-b pb-2">Business Settings</h2>
                                <div><label className="input-label">Company Name</label><input value={profile.companyName} onChange={e => handleProfileChange('companyName', e.target.value)} className="w-full border-b p-2 text-sm" /></div>
                                <div><label className="input-label">GSTIN</label><input value={profile.gstin} onChange={e => handleProfileChange('gstin', e.target.value)} className="w-full border-b p-2 text-sm" /></div>
                                <button onClick={() => setView('home')} className="w-full bg-indigo-600 text-white p-4 rounded-2xl font-bold mt-4">Save Details</button>
                            </div>
                        )}
                    </main>

                    {showBillModal && (
                        <div className="fixed inset-0 bg-black/60 z-[100] flex items-end">
                            <div className="bg-white w-full rounded-t-[2.5rem] p-6 max-h-[90vh] overflow-y-auto no-scrollbar shadow-2xl space-y-5">
                                <div className="flex justify-between items-center border-b pb-4">
                                    <h3 className="font-bold text-lg text-indigo-800">NEW INVOICE</h3>
                                    <button onClick={() => setShowBillModal(false)} className="text-gray-300 text-3xl">&times;</button>
                                </div>

                                {/* Buyer Details Section */}
                                <div className="space-y-3">
                                    <div className="bg-indigo-50/50 p-4 rounded-2xl space-y-3">
                                        <div><label className="input-label">Buyer Name</label><input value={bill.buyerName} onChange={e => handleBillChange('buyerName', e.target.value)} className="w-full bg-white border rounded-lg p-2 text-sm" /></div>
                                        <div><label className="input-label">Buyer GSTIN</label><input value={bill.buyerGSTIN} onChange={e => handleBillChange('buyerGSTIN', e.target.value)} className="w-full bg-white border rounded-lg p-2 text-sm" /></div>
                                    </div>

                                    <p className="input-label pt-2">Item List</p>
                                    {bill.items.map(it => (
                                        <div key={it.id} className="bg-white p-4 rounded-2xl border-2 border-gray-100 space-y-3 relative shadow-sm">
                                            {bill.items.length > 1 && (
                                                <button onClick={() => setBill(p => ({...p, items: p.items.filter(x => x.id !== it.id)}))} className="absolute top-2 right-2 text-red-400 font-bold">&times;</button>
                                            )}
                                            
                                            <div>
                                                <label className="input-label">Item Description</label>
                                                <input value={it.desc} onChange={e => handleItemChange(it.id, 'desc', e.target.value)} className="w-full border-b-2 border-indigo-100 p-1 text-sm font-semibold" />
                                            </div>

                                            <div className="grid grid-cols-4 gap-2">
                                                <div><label className="input-label text-[8px]">HSN</label><input value={it.hsn} onChange={e => handleItemChange(it.id, 'hsn', e.target.value)} className="w-full border rounded p-1 text-xs" /></div>
                                                <div><label className="input-label text-[8px]">Qty</label><input type="number" value={it.qty} onChange={e => handleItemChange(it.id, 'qty', Number(e.target.value))} className="w-full border rounded p-1 text-xs" /></div>
                                                <div><label className="input-label text-[8px]">Rate</label><input type="number" value={it.rate} onChange={e => handleItemChange(it.id, 'rate', Number(e.target.value))} className="w-full border rounded p-1 text-xs" /></div>
                                                <div><label className="input-label text-[8px]">GST %</label>
                                                    <select value={it.gstRate} onChange={e => handleItemChange(it.id, 'gstRate', Number(e.target.value))} className="w-full border rounded p-1 text-xs bg-white">
                                                        <option value="0">0%</option><option value="5">5%</option><option value="12">12%</option><option value="18">18%</option><option value="28">28%</option>
                                                    </select>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                    <button onClick={() => setBill(p => ({...p, items: [...p.items, { id: Date.now(), desc: '', hsn: '', qty: 1, rate: 0, gstRate: 18 }]}))} className="w-full border-2 border-dashed border-indigo-200 text-indigo-600 p-2 rounded-xl text-xs font-bold">+ Add Item</button>

                                    <div className="bg-indigo-900 text-white p-6 rounded-[2rem] flex justify-between items-center mt-6 shadow-xl">
                                        <div><p className="text-[10px] opacity-60">Grand Total</p><h2 className="text-2xl font-black">₹{totals.grandTotal.toLocaleString()}</h2></div>
                                        <button onClick={() => {
                                            const newInv = { meta: bill, totals, id: Date.now() };
                                            setInvoices([newInv, ...invoices]);
                                            generatePDF(bill, totals);
                                            setShowBillModal(false);
                                        }} className="bg-yellow-400 text-indigo-900 px-6 py-3 rounded-xl font-black text-xs uppercase shadow-lg active:scale-95">Download</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TenderMitra />);
    </script>
</body>
</html>
